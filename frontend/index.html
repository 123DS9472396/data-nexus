<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DataNexus Platform</title>
    <!-- Import Modern Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
      :root {
        /* Deep, rich dark mode palette */
        --color-bg-primary: #0A0A0B;
        --color-bg-secondary: rgba(255, 255, 255, 0.03);
        --color-bg-tertiary: rgba(255, 255, 255, 0.05);
        
        --color-text-primary: #FFFFFF;
        --color-text-secondary: #A1A1AA;
        --color-text-tertiary: #71717A;
        
        --color-accent-primary: #3B82F6; /* Vibrant Blue */
        --color-accent-secondary: #8B5CF6; /* Purple */
        --color-accent-gradient: linear-gradient(135deg, #3B82F6 0%, #8B5CF6 100%);
        
        --color-border: rgba(255, 255, 255, 0.08);
        --color-border-hover: rgba(255, 255, 255, 0.15);

        /* Status Colors */
        --status-success-bg: rgba(16, 185, 129, 0.15);
        --status-success-text: #34D399;
        --status-danger-bg: rgba(239, 68, 68, 0.15);
        --status-danger-text: #F87171;
        --status-warning-bg: rgba(245, 158, 11, 0.15);
        --status-warning-text: #FBBF24;
        --status-info-bg: rgba(59, 130, 246, 0.15);
        --status-info-text: #60A5FA;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: 'Outfit', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background-color: var(--color-bg-primary);
        color: var(--color-text-primary);
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        background-image: 
          radial-gradient(circle at 15% 50%, rgba(59, 130, 246, 0.08) 0%, transparent 50%),
          radial-gradient(circle at 85% 30%, rgba(139, 92, 246, 0.08) 0%, transparent 50%);
        background-attachment: fixed;
      }

      /* Glassmorphism Card Utilities */
      .glass-card {
        background: var(--color-bg-secondary);
        backdrop-filter: blur(16px);
        -webkit-backdrop-filter: blur(16px);
        border: 1px solid var(--color-border);
        border-radius: 16px;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        transition: transform 0.2s ease, border-color 0.2s ease, box-shadow 0.2s ease;
      }

      .glass-card:hover {
        border-color: var(--color-border-hover);
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.2);
      }

      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--color-border);
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: var(--color-text-tertiary);
      }
      
      /* Animations */
      @keyframes fade-in-up {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
      }
      
      .animate-enter {
        animation: fade-in-up 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
